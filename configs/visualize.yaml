data:
  train_dir: data/processed/train
  val_dir: data/processed/val
  obs_len: 8
  pred_len: 12
  skip: 1
  min_ped: 1
  neighbor_radius: 2.5
  max_neighbors: 16
  scene_dir: null
  scene_ext: .npy

model:
  hidden_dim: 64
  scene_dim: 128
  latent_dim: 16
  use_scene: true
  use_social: true

train:
  device: cuda
  save_dir: outputs/checkpoints

eval:
  sample_k: 40
  checkpoint: outputs/checkpoints/best.pt

visualize:
  output_dir: outputs/figures
  num_images: 10
  start_index: 0
  select_mode: best_ade
  scan_limit: 300
  sample_k: 40
